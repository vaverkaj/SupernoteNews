name: scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Show current directory and files
        run: |
          pwd
          ls -la

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Extract extension
        run: unzip bypass-paywalls-chrome-clean-master.zip

      - name: Extract fonts
        run: unzip fonts.zip

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Restore Google Drive token
        run: echo "$GDRIVE_TOKEN" | base64 --decode > token.pickle
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}

      - name: Check if seen-articles artifact exists
        id: check_artifact
        run: |
          # this uses the GitHub API to see if the artifact exists for this workflow
          ARTIFACTS=$(gh api repos/${GITHUB_REPOSITORY}/actions/artifacts --jq '.artifacts[].name')
          echo "ARTIFACTS=$ARTIFACTS" >> $GITHUB_ENV
          if echo "$ARTIFACTS" | grep -q "seen-articles"; then
            echo "ARTIFACT_EXISTS=true" >> $GITHUB_ENV
          else
            echo "ARTIFACT_EXISTS=false" >> $GITHUB_ENV
            echo "[]" > seen_articles.json  # initialize empty file
          fi

      - name: Download previous seen_articles.json
        uses: actions/download-artifact@v4
        with:
          name: seen-articles
          path: .
          if-no-artifact: warn

      - name: Run scraper in virtual display
        run: |
          xvfb-run -a python news.py

      - name: Upload updated seen_articles.json
        uses: actions/upload-artifact@v4
        with:
          name: seen-articles
          path: seen_articles.json